<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Verdant — Cave Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0c0a09;overflow:hidden;height:100%;touch-action:none;-webkit-user-select:none;user-select:none}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const GRID = 128;

// Cell types — match Rust Cell constructors
// Export char map: A=air R=rock W=water S=soil L=loose M=machine P=plant H=hot
const CELL = { AIR: 0, ROCK: 1, WATER: 2, SOIL: 3, LOOSE: 4, MACHINE: 5, PLANT: 6, HOT: 7 };
const CELL_CHAR = ["A", "R", "W", "S", "L", "M", "P", "H"];
const CELL_LABEL = ["AIR", "ROCK", "WATER", "SOIL", "LOOSE", "MACH", "PLANT", "HOT"];

// Colors match verdant render palette
const CELL_COLOR = {
  [CELL.AIR]:     "#08080d",  // void / near-black
  [CELL.ROCK]:    "#80808c",  // cool grey
  [CELL.WATER]:   "#1459d9",  // blue
  [CELL.SOIL]:    "#59473a",  // warm brown (dry)
  [CELL.LOOSE]:   "#7c5c3e",  // lighter brown (loose/wet soil)
  [CELL.MACHINE]: "#4a7c59",  // muted green-grey — machine metal
  [CELL.PLANT]:   "#2d6e3a",  // dark green — cave moss / pre-placed plant
  [CELL.HOT]:     "#c45c14",  // orange — geothermal / warm rock
};

// Cave starts filled with rock — user carves air, places water
const makeGrid = () =>
  Array.from({ length: GRID }, () => new Uint8Array(GRID).fill(CELL.ROCK));
const cloneGrid = (g) => g.map((row) => new Uint8Array(row));

function CaveEditor() {
  const canvasRef = useRef(null);
  const gridRef = useRef(makeGrid());
  const [activeCell, setActiveCell] = useState(CELL.AIR);
  const [tool, setTool] = useState("brush");
  const [brushSize, setBrushSize] = useState(3);
  const [undoStack, setUndoStack] = useState([]);
  const [caveName, setCaveName] = useState("tutorial_cave");
  const [fileName, setFileName] = useState("tutorial_cave");
  const [showExport, setShowExport] = useState(false);
  const [exportText, setExportText] = useState("");
  const [showGrid, setShowGrid] = useState(true);
  const drawingRef = useRef(false);
  const lastPosRef = useRef(null);
  const snapshotRef = useRef(null);
  const cellSizeRef = useRef(4);
  const spawnRef = useRef(null); // {x, y} or null — player spawn flag
  const [spawnPoint, setSpawnPoint] = useState(null);

  const renderCanvas = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const cs = cellSizeRef.current;
    const grid = gridRef.current;

    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        ctx.fillStyle = CELL_COLOR[grid[y][x]];
        ctx.fillRect(x * cs, y * cs, cs, cs);
      }
    }

    // Draw spawn marker
    const sp = spawnRef.current;
    if (sp) {
      const sx = sp.x * cs + cs / 2;
      const sy = sp.y * cs + cs / 2;
      const r = Math.max(cs * 1.5, 4);
      ctx.save();
      ctx.strokeStyle = "#facc15";
      ctx.lineWidth = Math.max(1.5, cs * 0.4);
      ctx.beginPath(); ctx.moveTo(sx - r, sy); ctx.lineTo(sx + r, sy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, sy - r); ctx.lineTo(sx, sy + r); ctx.stroke();
      ctx.beginPath(); ctx.arc(sx, sy, r * 0.55, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    if (showGrid && cs >= 4) {
      ctx.strokeStyle = "rgba(255,255,255,0.05)";
      ctx.lineWidth = 0.5;
      const step = cs >= 6 ? 8 : 16;
      for (let i = 0; i <= GRID; i += step) {
        ctx.beginPath(); ctx.moveTo(i * cs, 0); ctx.lineTo(i * cs, GRID * cs); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * cs); ctx.lineTo(GRID * cs, i * cs); ctx.stroke();
      }
    }
  }, [showGrid]);

  useEffect(() => {
    const resize = () => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      const container = canvas.parentElement;
      const availW = container.clientWidth - 8;
      const availH = container.clientHeight - 8;
      const dim = Math.max(Math.floor(Math.min(availW, availH) / GRID), 2);
      cellSizeRef.current = dim;
      canvas.width = dim * GRID;
      canvas.height = dim * GRID;
      renderCanvas();
    };
    const t = setTimeout(resize, 50);
    window.addEventListener("resize", resize);
    return () => { clearTimeout(t); window.removeEventListener("resize", resize); };
  }, [renderCanvas]);

  useEffect(() => { renderCanvas(); }, [renderCanvas]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === "INPUT") return;
      const keyMap = {
        "1": CELL.AIR, "2": CELL.ROCK, "3": CELL.WATER,
        "4": CELL.SOIL, "5": CELL.LOOSE, "6": CELL.MACHINE,
        "7": CELL.PLANT, "8": CELL.HOT,
      };
      if (keyMap[e.key] !== undefined) { setActiveCell(keyMap[e.key]); setTool("brush"); }
      else if (e.key === "0") setTool("spawn");
      else if (e.key === "e" || e.key === "E") setTool("eraser");
      else if (e.key === "f" || e.key === "F") setTool("fill");
      else if ((e.key === "z" || e.key === "Z") && !e.shiftKey) {
        setUndoStack((prev) => {
          if (prev.length === 0) return prev;
          const next = [...prev];
          gridRef.current = next.pop();
          renderCanvas();
          return next;
        });
      }
      else if (e.key === "g" || e.key === "G") setShowGrid((v) => !v);
      else if (e.key === "[") setBrushSize((s) => Math.max(1, s - 1));
      else if (e.key === "]") setBrushSize((s) => Math.min(12, s + 1));
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [renderCanvas]);

  const stamp = useCallback((gx, gy) => {
    const grid = gridRef.current;
    const fill = tool === "eraser" ? CELL.AIR : activeCell;
    const r = brushSize;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        if (dx * dx + dy * dy <= r * r) {
          const nx = gx + dx, ny = gy + dy;
          if (nx >= 0 && nx < GRID && ny >= 0 && ny < GRID) {
            grid[ny][nx] = fill;
          }
        }
      }
    }
  }, [activeCell, brushSize, tool]);

  const drawLine = useCallback((x0, y0, x1, y1) => {
    const dist = Math.max(Math.abs(x1 - x0), Math.abs(y1 - y0));
    const steps = Math.max(dist, 1);
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      stamp(Math.round(x0 + (x1 - x0) * t), Math.round(y0 + (y1 - y0) * t));
    }
    renderCanvas();
  }, [stamp, renderCanvas]);

  const floodFill = useCallback((sx, sy) => {
    const grid = gridRef.current;
    const target = grid[sy][sx];
    const fill = activeCell;
    if (target === fill) return;
    setUndoStack((prev) => [...prev.slice(-19), cloneGrid(grid)]);
    const stack = [[sx, sy]];
    const visited = new Set();
    while (stack.length > 0) {
      const [x, y] = stack.pop();
      const key = y * GRID + x;
      if (visited.has(key)) continue;
      if (x < 0 || x >= GRID || y < 0 || y >= GRID) continue;
      if (grid[y][x] !== target) continue;
      visited.add(key);
      grid[y][x] = fill;
      stack.push([x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]);
    }
    renderCanvas();
  }, [activeCell, renderCanvas]);

  const getGridPos = useCallback((e) => {
    const canvas = canvasRef.current;
    if (!canvas) return null;
    const rect = canvas.getBoundingClientRect();
    const cs = cellSizeRef.current;
    let cx, cy;
    if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
    else { cx = e.clientX; cy = e.clientY; }
    const x = Math.floor((cx - rect.left) / cs);
    const y = Math.floor((cy - rect.top) / cs);
    if (x < 0 || x >= GRID || y < 0 || y >= GRID) return null;
    return { x, y };
  }, []);

  const handleStart = useCallback((e) => {
    e.preventDefault();
    const pos = getGridPos(e);
    if (!pos) return;
    if (tool === "spawn") {
      spawnRef.current = { x: pos.x, y: pos.y };
      setSpawnPoint({ x: pos.x, y: pos.y });
      renderCanvas();
      return;
    }
    if (tool === "fill") { floodFill(pos.x, pos.y); return; }
    snapshotRef.current = cloneGrid(gridRef.current);
    drawingRef.current = true;
    lastPosRef.current = pos;
    stamp(pos.x, pos.y);
    renderCanvas();
  }, [getGridPos, tool, floodFill, stamp, renderCanvas]);

  const handleMove = useCallback((e) => {
    e.preventDefault();
    if (!drawingRef.current) return;
    const pos = getGridPos(e);
    if (!pos) return;
    const last = lastPosRef.current;
    if (last) drawLine(last.x, last.y, pos.x, pos.y);
    lastPosRef.current = pos;
  }, [getGridPos, drawLine]);

  const handleEnd = useCallback(() => {
    if (drawingRef.current && snapshotRef.current) {
      setUndoStack((prev) => [...prev.slice(-19), snapshotRef.current]);
      snapshotRef.current = null;
    }
    drawingRef.current = false;
    lastPosRef.current = null;
  }, []);

  const undo = useCallback(() => {
    setUndoStack((prev) => {
      if (prev.length === 0) return prev;
      const next = [...prev];
      gridRef.current = next.pop();
      renderCanvas();
      return next;
    });
  }, [renderCanvas]);

  const clearGrid = useCallback(() => {
    setUndoStack((prev) => [...prev.slice(-19), cloneGrid(gridRef.current)]);
    gridRef.current = makeGrid();
    renderCanvas();
  }, [renderCanvas]);

  // Export as .cave text format
  // Line 1: "# name: <name>"
  // Line 2: "# size: 128 128"
  // Lines 3+: 128 chars per row, A/R/W/S/L
  const generateCaveText = useCallback(() => {
    const grid = gridRef.current;
    const lines = [
      `# name: ${fileName}`,
      `# size: ${GRID} ${GRID}`,
    ];
    if (spawnRef.current) {
      lines.push(`# spawn: ${spawnRef.current.x} ${spawnRef.current.y}`);
    }
    for (let y = 0; y < GRID; y++) {
      let row = "";
      for (let x = 0; x < GRID; x++) {
        row += CELL_CHAR[grid[y][x]] ?? "R";
      }
      lines.push(row);
    }
    return lines.join("\n");
  }, [caveName]);

  const doExport = useCallback(() => {
    setExportText(generateCaveText());
    setShowExport(true);
  }, [generateCaveText]);

  const downloadCave = useCallback(() => {
    const text = generateCaveText();
    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${fileName}.cave`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, [generateCaveText, caveName]);

  // Save / Load via localStorage
  const saveCave = useCallback(() => {
    const data = {
      name: caveName,
      grid: gridRef.current.map((row) => Array.from(row)),
      spawn: spawnRef.current,
    };
    localStorage.setItem(`verdant_cave_${caveName}`, JSON.stringify(data));
    const index = JSON.parse(localStorage.getItem("verdant_cave_index") || "[]");
    if (!index.includes(caveName)) { index.push(caveName); localStorage.setItem("verdant_cave_index", JSON.stringify(index)); }
    alert(`Saved: ${caveName}`);
  }, [caveName]);

  const [showLoad, setShowLoad] = useState(false);
  const [savedCaves, setSavedCaves] = useState([]);

  const openLoad = useCallback(() => {
    setSavedCaves(JSON.parse(localStorage.getItem("verdant_cave_index") || "[]"));
    setShowLoad(true);
  }, []);

  const loadCave = useCallback((name) => {
    const raw = localStorage.getItem(`verdant_cave_${name}`);
    if (!raw) return;
    const data = JSON.parse(raw);
    setUndoStack((prev) => [...prev.slice(-19), cloneGrid(gridRef.current)]);
    gridRef.current = data.grid.map((row) => new Uint8Array(row));
    spawnRef.current = data.spawn ?? null;
    setSpawnPoint(data.spawn ?? null);
    setCaveName(data.name);
    setFileName(data.name);
    setShowLoad(false);
    setTimeout(renderCanvas, 0);
  }, [renderCanvas]);

  const deleteCave = useCallback((name) => {
    localStorage.removeItem(`verdant_cave_${name}`);
    const index = JSON.parse(localStorage.getItem("verdant_cave_index") || "[]");
    localStorage.setItem("verdant_cave_index", JSON.stringify(index.filter((n) => n !== name)));
    setSavedCaves((prev) => prev.filter((n) => n !== name));
  }, []);

  // Import .cave file
  const importFile = useCallback((e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const lines = ev.target.result.split("\n");
      const dataLines = lines.filter((l) => !l.startsWith("#"));
      if (dataLines.length < GRID) { alert("File too short"); return; }
      const charMap = { A: CELL.AIR, R: CELL.ROCK, W: CELL.WATER, S: CELL.SOIL, L: CELL.LOOSE,
                        M: CELL.MACHINE, P: CELL.PLANT, H: CELL.HOT };
      const newGrid = makeGrid();
      for (let y = 0; y < GRID; y++) {
        const row = dataLines[y] || "";
        for (let x = 0; x < GRID; x++) {
          newGrid[y][x] = charMap[row[x]] ?? CELL.ROCK;
        }
      }
      setUndoStack((prev) => [...prev.slice(-19), cloneGrid(gridRef.current)]);
      gridRef.current = newGrid;
      // Extract name from comment if present
      const nameLine = lines.find((l) => l.startsWith("# name:"));
      if (nameLine) {
        const n = nameLine.replace("# name:", "").trim();
        setCaveName(n);
        setFileName(n);
      }
      // Extract spawn point if present
      const spawnLine = lines.find((l) => l.startsWith("# spawn:"));
      if (spawnLine) {
        const parts = spawnLine.replace("# spawn:", "").trim().split(/\s+/);
        const sx = parseInt(parts[0], 10), sy = parseInt(parts[1], 10);
        if (!isNaN(sx) && !isNaN(sy)) {
          spawnRef.current = { x: sx, y: sy };
          setSpawnPoint({ x: sx, y: sy });
        }
      } else {
        spawnRef.current = null;
        setSpawnPoint(null);
      }
      setTimeout(renderCanvas, 0);
    };
    reader.readAsText(file);
    e.target.value = "";
  }, [renderCanvas]);

  const fileInputRef = useRef(null);

  const s = {
    root: { background:"#0c0a09", height:"100vh", color:"#e7e5e4", fontFamily:"'DM Mono','Fira Code',monospace", display:"flex", flexDirection:"column", overflow:"hidden", touchAction:"none" },
    header: { padding:"8px 12px 6px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:"1px solid #1c1917", flexShrink:0 },
    canvasWrap: { flex:"1 1 0", display:"flex", alignItems:"center", justifyContent:"center", padding:4, overflow:"hidden", minHeight:0 },
    toolbar: { borderTop:"1px solid #1c1917", background:"#0c0a09", padding:"6px 10px 10px", flexShrink:0 },
  };

  const cellBtn = (cell) => {
    const active = activeCell === cell && tool === "brush";
    return (
      <button onClick={() => { setActiveCell(cell); setTool("brush"); }} style={{
        flex:1, padding:"7px 2px", background: active ? CELL_COLOR[cell] : "transparent",
        color: active ? "#fafaf9" : "#a8a29e",
        border:`2px solid ${active ? CELL_COLOR[cell] : "#44403c"}`,
        borderRadius:6, fontFamily:"inherit", fontSize:9, fontWeight:700,
        letterSpacing:"0.04em", cursor:"pointer",
      }}>{CELL_LABEL[cell]}</button>
    );
  };

  const toolBtn = (t, label, icon) => (
    <button onClick={() => setTool(t)} style={{
      flex:1, padding:"7px 2px", background: tool === t ? "#44403c" : "transparent",
      color: tool === t ? "#fafaf9" : "#78716c",
      border:`2px solid ${tool === t ? "#57534e" : "#292524"}`,
      borderRadius:6, fontFamily:"inherit", fontSize:9, fontWeight:600, cursor:"pointer",
    }}><span style={{fontSize:13}}>{icon}</span><br/>{label}</button>
  );

  const hdrBtn = (onClick, label, color = "#a8a29e") => (
    <button onClick={onClick} style={{background:"#1c1917",border:"1px solid #292524",color,borderRadius:6,padding:"4px 8px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>{label}</button>
  );

  return (
    <div style={s.root}>
      {/* Header */}
      <div style={s.header}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div>
            <div style={{fontSize:8,color:"#57534e",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:1}}>label</div>
            <input value={caveName} onChange={(e)=>setCaveName(e.target.value)}
              style={{background:"transparent",border:"none",borderBottom:"1px solid #292524",color:"#a8a29e",fontFamily:"inherit",fontSize:12,padding:"1px 0",width:110,outline:"none"}}
              placeholder="label"/>
          </div>
          <div>
            <div style={{fontSize:8,color:"#57534e",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:1}}>filename</div>
            <input value={fileName} onChange={(e)=>setFileName(e.target.value)}
              style={{background:"transparent",border:"none",borderBottom:"1px solid #f59e0b",color:"#fef3c7",fontFamily:"inherit",fontSize:12,fontWeight:600,padding:"1px 0",width:130,outline:"none"}}
              placeholder="filename (no ext)"/>
          </div>
        </div>
        {spawnPoint && (
          <div style={{fontSize:9,color:"#facc15",fontFamily:"'DM Mono','Fira Code',monospace",alignSelf:"center",marginRight:4}}>
            ⊕ spawn {spawnPoint.x},{spawnPoint.y}
          </div>
        )}
        <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {hdrBtn(saveCave, "Save", "#f59e0b")}
          {hdrBtn(openLoad, "Load")}
          {hdrBtn(() => fileInputRef.current?.click(), "Import")}
          {hdrBtn(undo, "↩")}
          {hdrBtn(clearGrid, "Clr", "#78716c")}
          {hdrBtn(() => setShowGrid(v => !v), showGrid ? "Grid ✓" : "Grid")}
          <input ref={fileInputRef} type="file" accept=".cave,.txt" onChange={importFile} style={{display:"none"}}/>
        </div>
      </div>

      {/* Canvas */}
      <div style={s.canvasWrap}>
        <canvas ref={canvasRef}
          onMouseDown={handleStart} onMouseMove={handleMove} onMouseUp={handleEnd} onMouseLeave={handleEnd}
          onTouchStart={handleStart} onTouchMove={handleMove} onTouchEnd={handleEnd}
          style={{borderRadius:2,border:"1px solid #292524",touchAction:"none",cursor:tool==="fill"?"crosshair":"crosshair",imageRendering:"pixelated"}}/>
      </div>

      {/* Toolbar */}
      <div style={s.toolbar}>
        {/* Cell type rows */}
        <div style={{display:"flex",gap:3,marginBottom:3}}>
          {cellBtn(CELL.AIR)}
          {cellBtn(CELL.ROCK)}
          {cellBtn(CELL.WATER)}
          {cellBtn(CELL.SOIL)}
          {cellBtn(CELL.LOOSE)}
          {cellBtn(CELL.MACHINE)}
          {cellBtn(CELL.PLANT)}
          {cellBtn(CELL.HOT)}
          {toolBtn("eraser", "ERASE", "◌")}
          {toolBtn("fill", "FLOOD", "◉")}
          {toolBtn("spawn", "SPAWN", "⊕")}
        </div>
        {/* Brush size + export */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:9,color:"#57534e",minWidth:36,flexShrink:0}}>BR {brushSize}</span>
          <input type="range" min={1} max={12} value={brushSize} onChange={(e)=>setBrushSize(+e.target.value)}
            style={{flex:1,accentColor:"#f59e0b",height:20}}/>
          <div style={{width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <div style={{width:Math.min(18,brushSize*2.2),height:Math.min(18,brushSize*2.2),borderRadius:"50%",
              background:tool==="eraser"?"#44403c":CELL_COLOR[activeCell],border:"1px solid #57534e"}}/>
          </div>
          <button onClick={doExport} style={{
            padding:"6px 14px",background:"linear-gradient(135deg,#b45309,#92400e)",color:"#fef3c7",
            border:"none",borderRadius:6,fontSize:11,fontFamily:"inherit",fontWeight:700,letterSpacing:"0.08em",cursor:"pointer",flexShrink:0,
          }}>EXPORT</button>
        </div>
        {/* Key hints */}
        <div style={{marginTop:4,fontSize:8,color:"#44403c",letterSpacing:"0.05em"}}>
          1=air  2=rock  3=water  4=soil  5=loose  6=mach  7=plant  8=hot  0=spawn  E=erase  F=flood  Z=undo  G=grid  [/]=brush
        </div>
      </div>

      {/* Export modal */}
      {showExport && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,padding:10}}
          onClick={(e)=>{if(e.target===e.currentTarget)setShowExport(false)}}>
          <div style={{background:"#1c1917",border:"1px solid #292524",borderRadius:12,padding:14,width:"100%",maxWidth:520,maxHeight:"72vh",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div>
                <span style={{fontSize:13,fontWeight:600}}>{caveName}.cave</span>
                <span style={{fontSize:10,color:"#57534e",marginLeft:10}}>128×128 · A/R/W/S/L chars</span>
              </div>
              <button onClick={()=>setShowExport(false)} style={{background:"none",border:"none",color:"#78716c",fontSize:18,cursor:"pointer"}}>✕</button>
            </div>
            <textarea readOnly value={exportText} onFocus={(e)=>e.target.select()}
              style={{flex:1,minHeight:180,background:"#0c0a09",border:"1px solid #292524",borderRadius:6,padding:10,fontSize:8,
                color:"#a8a29e",fontFamily:"monospace",resize:"none",marginBottom:10,whiteSpace:"pre",overflowWrap:"normal"}}/>
            <div style={{fontSize:9,color:"#57534e",marginBottom:8}}>
              A→AIR  R→rock  W→water  S/L→loose_soil  M→hard_rock  P→plant(moss)  H→hot_rock(200°)
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>navigator.clipboard.writeText(exportText).catch(()=>{})}
                style={{flex:1,padding:10,background:"#292524",color:"#d6d3d1",border:"1px solid #44403c",borderRadius:8,fontSize:11,fontFamily:"inherit",fontWeight:600,cursor:"pointer"}}>
                COPY
              </button>
              <button onClick={downloadCave}
                style={{flex:1,padding:10,background:"linear-gradient(135deg,#b45309,#92400e)",color:"#fef3c7",border:"none",borderRadius:8,fontSize:11,fontFamily:"inherit",fontWeight:700,cursor:"pointer"}}>
                DOWNLOAD .cave
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Load modal */}
      {showLoad && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,padding:10}}
          onClick={(e)=>{if(e.target===e.currentTarget)setShowLoad(false)}}>
          <div style={{background:"#1c1917",border:"1px solid #292524",borderRadius:12,padding:14,width:"100%",maxWidth:480,maxHeight:"60vh",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:13,fontWeight:600}}>Saved Caves</span>
              <button onClick={()=>setShowLoad(false)} style={{background:"none",border:"none",color:"#78716c",fontSize:18,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{flex:1,overflow:"auto"}}>
              {savedCaves.length === 0 && <div style={{color:"#57534e",fontSize:12,padding:20,textAlign:"center"}}>No saved caves yet</div>}
              {savedCaves.map((name) => (
                <div key={name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 4px",borderBottom:"1px solid #292524"}}>
                  <button onClick={()=>loadCave(name)} style={{background:"none",border:"none",color:"#d6d3d1",fontFamily:"inherit",fontSize:13,cursor:"pointer",textAlign:"left",flex:1}}>{name}</button>
                  <button onClick={()=>deleteCave(name)} style={{background:"none",border:"none",color:"#78716c",fontSize:14,cursor:"pointer",padding:"4px 8px"}}>✕</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CaveEditor/>);
</script>
</body>
</html>
